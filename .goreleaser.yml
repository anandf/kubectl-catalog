version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: kubectl-catalog
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/anandf/kubectl-catalog/cmd.version={{.Version}}
      - -X github.com/anandf/kubectl-catalog/cmd.gitCommit={{.ShortCommit}}
      - -X github.com/anandf/kubectl-catalog/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: anandf
    name: kubectl-catalog
  draft: false
  prerelease: auto
